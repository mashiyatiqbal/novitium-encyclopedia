<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" preserveAspectRatio="xMidYMax slice" role="img" aria-label="Golden-hour solar farm with wind turbines">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#081627"/>
      <stop offset="40%" stop-color="#0d2342"/>
      <stop offset="68%" stop-color="#45403f"/>
      <stop offset="85%" stop-color="#a76c37"/>
      <stop offset="100%" stop-color="#d59247"/>
    </linearGradient>
    <radialGradient id="sun" cx="63%" cy="75%" r="32%">
      <stop offset="0" stop-color="#fff2d4" stop-opacity="0.95"/>
      <stop offset="20%" stop-color="#ffcf86" stop-opacity="0.6"/>
      <stop offset="52%" stop-color="#f0a049" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e08a3a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16314f"/>
      <stop offset="100%" stop-color="#0a1b30"/>
    </linearGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#081627" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#081627" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#081627" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1440" height="600" fill="url(#sky)"/>
  <!-- sun glow -->
  <rect width="1440" height="600" fill="url(#sun)"/>
  <circle cx="901" cy="448" r="30" fill="#fff0cf" opacity="0.55"/>
  <circle cx="901" cy="448" r="15" fill="#fff6e2" opacity="0.9"/>

  <!-- distant hills -->
  <path d="M0 432 Q 360 388 720 420 T 1440 408 L1440 470 L0 470 Z" fill="#3a3b50" opacity="0.55"/>
  <path d="M0 452 Q 420 420 860 446 T 1440 440 L1440 480 L0 480 Z" fill="#26304a" opacity="0.75"/>

  <!-- wind turbines (silhouettes) -->
  <g fill="#0c1f38" opacity="0.9">
    <g transform="translate(250,300)">
      <rect x="-2.2" y="0" width="4.4" height="138"/>
      <g stroke="#0c1f38" stroke-width="5" stroke-linecap="round">
        <line x1="0" y1="0" x2="0" y2="-52"/>
        <line x1="0" y1="0" x2="45" y2="26"/>
        <line x1="0" y1="0" x2="-45" y2="26"/>
      </g>
      <circle cx="0" cy="0" r="4.5"/>
    </g>
    <g transform="translate(470,330) scale(0.78)">
      <rect x="-2.2" y="0" width="4.4" height="138"/>
      <g stroke="#0c1f38" stroke-width="5" stroke-linecap="round">
        <line x1="0" y1="0" x2="0" y2="-52"/><line x1="0" y1="0" x2="45" y2="26"/><line x1="0" y1="0" x2="-45" y2="26"/>
      </g><circle cx="0" cy="0" r="4.5"/>
    </g>
    <g transform="translate(1120,312) scale(0.9)">
      <rect x="-2.2" y="0" width="4.4" height="138"/>
      <g stroke="#0c1f38" stroke-width="5" stroke-linecap="round">
        <line x1="0" y1="0" x2="0" y2="-52"/><line x1="0" y1="0" x2="42" y2="-30"/><line x1="0" y1="0" x2="6" y2="52"/>
      </g><circle cx="0" cy="0" r="4.5"/>
    </g>
    <g transform="translate(1290,338) scale(0.7)">
      <rect x="-2.2" y="0" width="4.4" height="138"/>
      <g stroke="#0c1f38" stroke-width="5" stroke-linecap="round">
        <line x1="0" y1="0" x2="0" y2="-52"/><line x1="0" y1="0" x2="45" y2="26"/><line x1="0" y1="0" x2="-45" y2="26"/>
      </g><circle cx="0" cy="0" r="4.5"/>
    </g>
  </g>

  <!-- foreground solar field (perspective rows) -->
  <g>
    <rect x="0" y="470" width="1440" height="130" fill="url(#panel)"/>
    <!-- receding row separators -->
    <g stroke="#2c5378" stroke-width="2" opacity="0.65">
      <line x1="0" y1="486" x2="1440" y2="486"/>
      <line x1="0" y1="508" x2="1440" y2="508"/>
      <line x1="0" y1="536" x2="1440" y2="536"/>
      <line x1="0" y1="572" x2="1440" y2="572"/>
    </g>
    <!-- panel cell dividers (converging) -->
    <g stroke="#1c3a5a" stroke-width="1.5" opacity="0.7">
      <line x1="120" y1="470" x2="60" y2="600"/>
      <line x1="300" y1="470" x2="270" y2="600"/>
      <line x1="480" y1="470" x2="475" y2="600"/>
      <line x1="660" y1="470" x2="690" y2="600"/>
      <line x1="840" y1="470" x2="900" y2="600"/>
      <line x1="1020" y1="470" x2="1110" y2="600"/>
      <line x1="1200" y1="470" x2="1320" y2="600"/>
    </g>
    <!-- warm reflections off the glass -->
    <g fill="#ffcf8a" opacity="0.16">
      <polygon points="700,472 760,472 740,506 690,506"/>
      <polygon points="800,510 880,510 858,560 770,560"/>
      <polygon points="610,536 690,536 672,600 580,600"/>
    </g>
  </g>

  <!-- legibility vignette -->
  <rect width="1440" height="600" fill="url(#vignette)"/>
</svg>
