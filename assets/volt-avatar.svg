<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" role="img" aria-label="VOLT, the Commercial Solar Expert">
  <defs>
    <clipPath id="circle"><circle cx="80" cy="80" r="80"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2f7"/>
      <stop offset="1" stop-color="#d7dee8"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#circle)">
    <rect width="160" height="160" fill="url(#bg)"/>
    <!-- shoulders / navy fleece -->
    <path d="M20 160 C20 122 44 108 80 108 C116 108 140 122 140 160 Z" fill="#16294a"/>
    <path d="M74 110 L80 134 L86 110 Z" fill="#0f1d36"/>
    <!-- zipper -->
    <rect x="78.5" y="110" width="3" height="26" rx="1.5" fill="#3a4d70"/>
    <!-- sun emblem on chest -->
    <g transform="translate(104,124)">
      <circle r="6" fill="#f5912a"/>
      <g stroke="#f5912a" stroke-width="1.6" stroke-linecap="round">
        <line x1="0" y1="-9" x2="0" y2="-11"/>
        <line x1="6.4" y1="-6.4" x2="7.8" y2="-7.8"/>
        <line x1="9" y1="0" x2="11" y2="0"/>
        <line x1="6.4" y1="6.4" x2="7.8" y2="7.8"/>
      </g>
    </g>
    <!-- neck -->
    <rect x="68" y="92" width="24" height="22" rx="10" fill="#e6b58f"/>
    <!-- head -->
    <circle cx="80" cy="74" r="27" fill="#f0c19a"/>
    <!-- ears -->
    <circle cx="54" cy="76" r="5" fill="#e9b487"/>
    <circle cx="106" cy="76" r="5" fill="#e9b487"/>
    <!-- beard -->
    <path d="M55 72 C55 96 66 102 80 102 C94 102 105 96 105 72 C105 88 94 92 80 92 C66 92 55 88 55 72 Z" fill="#6b4a32"/>
    <path d="M62 84 C66 96 74 100 80 100 C86 100 94 96 98 84 C92 92 86 94 80 94 C74 94 68 92 62 84 Z" fill="#5a3d28"/>
    <!-- smile -->
    <path d="M70 84 Q80 92 90 84" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <!-- nose -->
    <path d="M80 72 L77 81 Q80 84 83 81 Z" fill="#e3a878"/>
    <!-- eyes -->
    <circle cx="69" cy="69" r="3" fill="#2a2a2a"/>
    <circle cx="91" cy="69" r="3" fill="#2a2a2a"/>
    <circle cx="70" cy="68" r="1" fill="#fff"/>
    <circle cx="92" cy="68" r="1" fill="#fff"/>
    <!-- eyebrows -->
    <path d="M63 62 Q69 59 75 62" stroke="#5a3d28" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M85 62 Q91 59 97 62" stroke="#5a3d28" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <!-- hard hat -->
    <path d="M48 60 C48 38 62 26 80 26 C98 26 112 38 112 60 Z" fill="#ffffff"/>
    <path d="M48 60 C48 38 62 26 80 26 C98 26 112 38 112 60 Z" fill="none" stroke="#d7dde6" stroke-width="1"/>
    <rect x="44" y="58" width="72" height="7" rx="3.5" fill="#ffffff" stroke="#d7dde6" stroke-width="0.8"/>
    <path d="M72 40 C72 33 88 33 88 40" fill="none" stroke="#e4e9f0" stroke-width="2"/>
    <!-- hat sun logo + VOLT -->
    <g transform="translate(80,42)">
      <circle r="4.2" fill="#f5912a"/>
      <g stroke="#f5912a" stroke-width="1.2" stroke-linecap="round">
        <line x1="0" y1="-6.5" x2="0" y2="-8"/>
        <line x1="4.6" y1="-4.6" x2="5.6" y2="-5.6"/>
        <line x1="-4.6" y1="-4.6" x2="-5.6" y2="-5.6"/>
      </g>
      <text x="0" y="13" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="8" fill="#1f5fa8">VOLT</text>
    </g>
  </g>
  <circle cx="80" cy="80" r="79" fill="none" stroke="#ffffff" stroke-width="2"/>
</svg>
